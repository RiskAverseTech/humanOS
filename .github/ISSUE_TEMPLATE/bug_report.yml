name: Bug report
description: Report a reproducible problem in HumanOS
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail for us to reproduce it.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Short description of the issue
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Browser:
        Deployment (local/Vercel/self-hosted):
        Commit/tag:
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots (optional)
      render: shell
